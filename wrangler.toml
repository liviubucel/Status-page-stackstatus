name = "status-page"
main = "src/index.js"
compatibility_date = "2026-03-17"
keep_vars = true
[vars]
ENABLE_20I_SOURCE = "true"
RSS_URL = "https://www.stackstatus.com/rss"
RSS_FALLBACK_URL = ""
TIME_ZONE = "Europe/Bucharest"
MAX_DESCRIPTION_LENGTH = "1800"
FETCH_TIMEOUT_MS = "15000"
PUBLIC_STATUS_URL = "https://zbt.statuspage.io"
HIDE_SOURCE_LINKS = "true"
STATUSPAGE_API_BASE_URL = "https://api.statuspage.io"
STATUSPAGE_DELIVER_NOTIFICATIONS = "false"
STATUSPAGE_COMPONENT_IDS = ""
STATUSPAGE_COMPONENT_UPDATES_ENABLED = "false"
UPMIND_STATUS_PAGE_ID = ""
UPMIND_API_BASE_URL = "https://oneuptime.com"
UPMIND_SOURCE_NAME = "Upmind"
UPMIND_SOURCE_URL = "https://status.upmind.com"
UPMIND_PUBLIC_STATUS_URL = "https://zbt.statuspage.io"
UPMIND_HIDE_SOURCE_LINKS = "true"
UPMIND_COMPONENT_IDS = ""
UPMIND_COMPONENT_UPDATES_ENABLED = "false"
STATUSPAGE_COMPONENT_STATUS_INVESTIGATING = "major_outage"
STATUSPAGE_COMPONENT_STATUS_IDENTIFIED = "partial_outage"
STATUSPAGE_COMPONENT_STATUS_MONITORING = "degraded_performance"
STATUSPAGE_COMPONENT_STATUS_RESOLVED = "operational"
STATUSPAGE_COMPONENT_STATUS_SCHEDULED = "degraded_performance"
STATUSPAGE_COMPONENT_STATUS_IN_PROGRESS = "degraded_performance"
STATUSPAGE_COMPONENT_STATUS_COMPLETED = "operational"
AI_TRANSLATION_ENABLED = "true"
AI_TRANSLATION_MODEL = "@cf/meta/m2m100-1.2b"
AI_SOURCE_LANG = "english"
AI_TARGET_LANG = "romanian"
AI_MAX_INPUT_LENGTH = "3500"
AI_INCIDENT_CLASSIFICATION_ENABLED = "true"
AI_INCIDENT_CLASSIFICATION_MODEL = "@cf/meta/llama-3.1-8b-instruct-awq"
AI_INCIDENT_CLASSIFICATION_MAX_INPUT_LENGTH = "2200"

[ai]
binding = "AI"

[triggers]
crons = ["*/5 * * * *"]
