name = "status-page"
main = "src/index.js"
compatibility_date = "2026-03-17"

[vars]
RSS_URL = "https://www.stackstatus.com/history.rss"
RSS_FALLBACK_URL = ""
TIME_ZONE = "Europe/Bucharest"
MAX_DESCRIPTION_LENGTH = "1800"
FETCH_TIMEOUT_MS = "15000"
INSTATUS_API_BASE_URL = "https://api.instatus.com"
INSTATUS_NOTIFY = "false"
INSTATUS_SHOULD_PUBLISH = "true"

[triggers]
crons = ["*/5 * * * *"]
