name = "status-page"
main = "src/index.js"
compatibility_date = "2026-03-17"

[vars]
ENABLE_20I_SOURCE = "true"
RSS_URL = "https://www.stackstatus.com/rss"
RSS_FALLBACK_URL = ""
TIME_ZONE = "Europe/Bucharest"
MAX_DESCRIPTION_LENGTH = "1800"
FETCH_TIMEOUT_MS = "15000"
PUBLIC_STATUS_URL = "https://status.zebrabyte.ro"
HIDE_SOURCE_LINKS = "true"
INSTATUS_API_BASE_URL = "https://api.instatus.com"
INSTATUS_NOTIFY = "false"
INSTATUS_SHOULD_PUBLISH = "true"
INSTATUS_COMPONENT_IDS = ""
INSTATUS_COMPONENT_UPDATES_ENABLED = "false"
UPMIND_STATUS_PAGE_ID = ""
UPMIND_API_BASE_URL = "https://oneuptime.com"
UPMIND_SOURCE_NAME = "Upmind"
UPMIND_SOURCE_URL = "https://status.upmind.com"
UPMIND_PUBLIC_STATUS_URL = "https://status.zebrabyte.ro"
UPMIND_HIDE_SOURCE_LINKS = "true"
UPMIND_COMPONENT_IDS = ""
UPMIND_COMPONENT_UPDATES_ENABLED = "false"
INSTATUS_COMPONENT_STATUS_INVESTIGATING = "MAJOROUTAGE"
INSTATUS_COMPONENT_STATUS_IDENTIFIED = "PARTIALOUTAGE"
INSTATUS_COMPONENT_STATUS_MONITORING = "DEGRADEDPERFORMANCE"
INSTATUS_COMPONENT_STATUS_RESOLVED = "OPERATIONAL"
AI_TRANSLATION_ENABLED = "true"
AI_TRANSLATION_MODEL = "@cf/meta/m2m100-1.2b"
AI_SOURCE_LANG = "english"
AI_TARGET_LANG = "romanian"
AI_MAX_INPUT_LENGTH = "3500"

[ai]
binding = "AI"

[triggers]
crons = ["*/5 * * * *"]
